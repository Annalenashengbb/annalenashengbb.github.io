<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>MindAR Image Tracking Starter</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
      .tip {
        position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 9999;
        background: rgba(0,0,0,.65); color: #fff; padding: 10px 12px; border-radius: 10px;
        font-size: 14px; line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="tip"></div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
     <a-assets>
  <a-asset-item id="avatarModel" src="./model.glb"></a-asset-item>
</a-assets>

<a-entity mindar-image-target="targetIndex: 0">
  <a-gltf-model
    src="#avatarModel"
    position="0 0 0.1"
    rotation="0 0 0"
    scale="0.3 0.3 0.3"
  ></a-gltf-model>
</a-entity>
    </a-scene>
  </body>
</html>
