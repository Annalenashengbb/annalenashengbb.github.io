<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>MindAR Image Tracking Starter</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
      .tip {
        position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 9999;
        background: rgba(0,0,0,.65); color: #fff; padding: 10px 12px; border-radius: 10px;
        font-size: 14px; line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="tip">先允许相机权限，然后把镜头对准你的目标图。<br>如果你有自己的 GLB，把 model.glb 放到同目录，并把下面注释里的 a-gltf-model 打开。</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <!-- 如果你有自己的模型，把文件命名为 model.glb 放到同目录，然后取消下面这一行的注释 -->
        <!-- <a-asset-item id="demoModel" src="./model.glb"></a-asset-item> -->
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 先用一个立方体确认路径跑通 -->
        <a-box position="0 0 0.1" depth="0.08" height="0.08" width="0.08" color="#4CC3D9"></a-box>

        <!-- 以后有 3D 模型时，把立方体删掉，打开下面这一段 -->
        <!-- <a-gltf-model
          src="#demoModel"
          position="0 0 0.1"
          rotation="0 0 0"
          scale="0.2 0.2 0.2"
        ></a-gltf-model> -->
      </a-entity>
    </a-scene>
  </body>
</html>
