<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MindAR Card</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="./config.js?v=8"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    #status {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      background: rgba(0,0,0,.65);
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      max-width: calc(100vw - 24px);
    }
  </style>
</head>
<body>
  <div id="status">loading...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; uiLoading: yes; maxTrack: 1;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity light="type: ambient; intensity: 1.2"></a-entity>
    <a-entity light="type: directional; intensity: 1.2" position="1 1 2"></a-entity>

    <a-entity id="card-target" mindar-image-target="targetIndex: 0"></a-entity>
  </a-scene>

  <script>
    function addModel(parent, src, position, rotation, scale) {
      const el = document.createElement("a-gltf-model");
      el.setAttribute("src", src);
      el.setAttribute("position", position || "0 0 0");
      el.setAttribute("rotation", rotation || "0 0 0");
      el.setAttribute("scale", scale || "1 1 1");
      parent.appendChild(el);
      return el;
    }

    window.addEventListener("DOMContentLoaded", () => {
      const cfg = window.CARD_CONFIG;
      const status = document.getElementById("status");
      const target = document.getElementById("card-target");

      let built = false;

      // 两层交互旋转
      let yawRoot = null;   // 左右“转身”
      let pitchRoot = null; // 上下翻

      // 当前角度
      let yawY = 0;
      let pitchX = 0;

      // 拖动状态
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let startYawY = 0;
      let startPitchX = 0;

      // 灵敏度
      const YAW_SENSITIVITY = 0.25;
      const PITCH_SENSITIVITY = 0.25;

      function applyRotation() {
        if (!yawRoot || !pitchRoot) return;

        // 左右滑：像人物左右转身
        yawRoot.setAttribute("rotation", `0 ${yawY} 0`);

        // 上下滑：上下翻，方向和手指一致
        pitchRoot.setAttribute("rotation", `${pitchX} 0 0`);
      }

      target.addEventListener("targetFound", () => {
        status.textContent = "target found · swipe left/right/up/down";

        if (built) return;
        built = true;

        // 第一层：先应用 config.js 里的基础摆放
        const comboBase = document.createElement("a-entity");
        comboBase.setAttribute("id", "combo-base");
        comboBase.setAttribute("position", cfg.catRoot.position);
        comboBase.setAttribute("rotation", cfg.catRoot.rotation);
        comboBase.setAttribute("scale", cfg.catRoot.scale);
        target.appendChild(comboBase);

        // 第二层：左右转身（本地 Y 轴）
        yawRoot = document.createElement("a-entity");
        yawRoot.setAttribute("id", "yaw-root");
        yawRoot.setAttribute("rotation", "0 0 0");
        comboBase.appendChild(yawRoot);

        // 第三层：上下翻（本地 X 轴）
        pitchRoot = document.createElement("a-entity");
        pitchRoot.setAttribute("id", "pitch-root");
        pitchRoot.setAttribute("rotation", "0 0 0");
        yawRoot.appendChild(pitchRoot);

        // 小猫
        addModel(pitchRoot, cfg.catModel, "0 0 0", "0 0 0", "1 1 1");

        // 左右手锚点
        const leftHand = document.createElement("a-entity");
        leftHand.setAttribute("id", "left-hand");
        leftHand.setAttribute("position", cfg.handAnchors.left.position);
        leftHand.setAttribute("rotation", cfg.handAnchors.left.rotation || "0 0 0");
        leftHand.setAttribute("scale", cfg.handAnchors.left.scale || "1 1 1");
        pitchRoot.appendChild(leftHand);

        const rightHand = document.createElement("a-entity");
        rightHand.setAttribute("id", "right-hand");
        rightHand.setAttribute("position", cfg.handAnchors.right.position);
        rightHand.setAttribute("rotation", cfg.handAnchors.right.rotation || "0 0 0");
        rightHand.setAttribute("scale", cfg.handAnchors.right.scale || "1 1 1");
        pitchRoot.appendChild(rightHand);

        // 调试球（如果 config.js 开了）
        if (cfg.debugHands) {
          const leftDebug = document.createElement("a-sphere");
          leftDebug.setAttribute("color", "red");
          leftDebug.setAttribute("radius", "0.01");
          leftHand.appendChild(leftDebug);

          const rightDebug = document.createElement("a-sphere");
          rightDebug.setAttribute("color", "blue");
          rightDebug.setAttribute("radius", "0.01");
          rightHand.appendChild(rightDebug);
        }

        const parentMap = {
          root: pitchRoot,
          leftHand,
          rightHand
        };

        // 所有挂件
        (cfg.attachments || []).forEach((item) => {
          const parent = parentMap[item.parent] || pitchRoot;
          addModel(
            parent,
            item.src,
            item.position || "0 0 0",
            item.rotation || "0 0 0",
            item.scale || "1 1 1"
          );
        });

        status.textContent = "models added · swipe freely";
      });

      target.addEventListener("targetLost", () => {
        status.textContent = "target lost";
      });

      // 手指按下
      document.addEventListener("touchstart", (e) => {
        if (!yawRoot || !pitchRoot) return;
        if (!e.touches || e.touches.length !== 1) return;

        dragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startYawY = yawY;
        startPitchX = pitchX;
      }, { passive: true });

      // 手指移动
      document.addEventListener("touchmove", (e) => {
        if (!dragging || !yawRoot || !pitchRoot) return;
        if (!e.touches || e.touches.length !== 1) return;

        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;

        // 手指往右，模型往右转
        yawY = startYawY + dx * YAW_SENSITIVITY;

        // 手指往下，模型往下翻（方向和手指一致）
        pitchX = startPitchX + dy * PITCH_SENSITIVITY;

        applyRotation();
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchend", () => {
        dragging = false;
      }, { passive: true });

      document.addEventListener("touchcancel", () => {
        dragging = false;
      }, { passive: true });
    });
  </script>
</body>
</html>
