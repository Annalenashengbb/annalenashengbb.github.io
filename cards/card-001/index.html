<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MindAR Card</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="./config.js?v=6"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    #status {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      background: rgba(0,0,0,.65);
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      max-width: calc(100vw - 24px);
    }
  </style>
</head>
<body>
  <div id="status">loading...</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; uiLoading: yes; maxTrack: 1;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity light="type: ambient; intensity: 1.2"></a-entity>
    <a-entity light="type: directional; intensity: 1.2" position="1 1 2"></a-entity>

    <a-entity id="card-target" mindar-image-target="targetIndex: 0"></a-entity>
  </a-scene>

  <script>
    function addModel(parent, src, position, rotation, scale) {
      const el = document.createElement("a-gltf-model");
      el.setAttribute("src", src);
      el.setAttribute("position", position || "0 0 0");
      el.setAttribute("rotation", rotation || "0 0 0");
      el.setAttribute("scale", scale || "1 1 1");
      parent.appendChild(el);
      return el;
    }

    window.addEventListener("DOMContentLoaded", () => {
      const cfg = window.CARD_CONFIG;
      const status = document.getElementById("status");
      const target = document.getElementById("card-target");

      let built = false;
      let spinRoot = null;

      // 手指旋转参数
      let dragging = false;
      let startX = 0;
      let startSpinZ = 0;
      let currentSpinZ = 0;

      // 灵敏度：数字越大，转得越快
      const ROTATE_SENSITIVITY = 0.25;

      function applySpin() {
        if (!spinRoot) return;
        spinRoot.setAttribute("rotation", `0 0 ${currentSpinZ}`);
      }

      target.addEventListener("targetFound", () => {
        status.textContent = "target found · swipe left/right to rotate";

        if (built) return;
        built = true;

        // 这一层专门负责手势旋转
        spinRoot = document.createElement("a-entity");
        spinRoot.setAttribute("id", "spin-root");
        spinRoot.setAttribute("rotation", "0 0 0");
        target.appendChild(spinRoot);

        // 这一层保留你 config.js 里的猫位置 / 朝向 / 大小
        const root = document.createElement("a-entity");
        root.setAttribute("id", "combo-root");
        root.setAttribute("position", cfg.catRoot.position);
        root.setAttribute("rotation", cfg.catRoot.rotation);
        root.setAttribute("scale", cfg.catRoot.scale);
        spinRoot.appendChild(root);

        // 小猫
        addModel(root, cfg.catModel, "0 0 0", "0 0 0", "1 1 1");

        // 左右手锚点
        const leftHand = document.createElement("a-entity");
        leftHand.setAttribute("id", "left-hand");
        leftHand.setAttribute("position", cfg.handAnchors.left.position);
        leftHand.setAttribute("rotation", cfg.handAnchors.left.rotation || "0 0 0");
        leftHand.setAttribute("scale", cfg.handAnchors.left.scale || "1 1 1");
        root.appendChild(leftHand);

        const rightHand = document.createElement("a-entity");
        rightHand.setAttribute("id", "right-hand");
        rightHand.setAttribute("position", cfg.handAnchors.right.position);
        rightHand.setAttribute("rotation", cfg.handAnchors.right.rotation || "0 0 0");
        rightHand.setAttribute("scale", cfg.handAnchors.right.scale || "1 1 1");
        root.appendChild(rightHand);

        // 调试小球（如果 config.js 打开）
        if (cfg.debugHands) {
          const leftDebug = document.createElement("a-sphere");
          leftDebug.setAttribute("color", "red");
          leftDebug.setAttribute("radius", "0.01");
          leftHand.appendChild(leftDebug);

          const rightDebug = document.createElement("a-sphere");
          rightDebug.setAttribute("color", "blue");
          rightDebug.setAttribute("radius", "0.01");
          rightHand.appendChild(rightDebug);
        }

        const parentMap = {
          root,
          leftHand,
          rightHand
        };

        (cfg.attachments || []).forEach((item) => {
          const parent = parentMap[item.parent] || root;
          addModel(
            parent,
            item.src,
            item.position || "0 0 0",
            item.rotation || "0 0 0",
            item.scale || "1 1 1"
          );
        });

        status.textContent = "models added · swipe left/right";
      });

      target.addEventListener("targetLost", () => {
        status.textContent = "target lost";
      });

      // 手指开始
      document.addEventListener("touchstart", (e) => {
        if (!spinRoot) return;
        if (!e.touches || e.touches.length !== 1) return;

        dragging = true;
        startX = e.touches[0].clientX;
        startSpinZ = currentSpinZ;
      }, { passive: true });

      // 手指移动
      document.addEventListener("touchmove", (e) => {
        if (!dragging || !spinRoot) return;
        if (!e.touches || e.touches.length !== 1) return;

        const dx = e.touches[0].clientX - startX;
        currentSpinZ = startSpinZ + dx * ROTATE_SENSITIVITY;
        applySpin();

        e.preventDefault();
      }, { passive: false });

      // 手指结束
      document.addEventListener("touchend", () => {
        dragging = false;
      }, { passive: true });

      document.addEventListener("touchcancel", () => {
        dragging = false;
      }, { passive: true });
    });
  </script>
</body>
</html>
